---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: inference-t2m
  namespace: weather-mlops
spec:
  replicas: 1
  selector:
    matchLabels:
      app: inference-t2m
  template:
    metadata:
      labels:
        app: inference-t2m
    spec:
      containers:
      - name: inference-t2m
        image: weather-inference:v1
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 5001
        resources:
          requests:
            cpu: "100m"
            memory: "512Mi"
          limits:
            cpu: "500m"
            memory: "1024Mi"
        env:
        - name: DB_SERVICE_URL
          value: "http://db-service:5004"
        volumeMounts:
        - name: model-storage
          mountPath: /app/models
      volumes:
      - name: model-storage
        persistentVolumeClaim:
          claimName: weather-models-pvc
