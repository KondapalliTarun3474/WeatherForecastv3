---
# MongoDB StatefulSet
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mongodb
  namespace: weather-mlops
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mongodb
  template:
    metadata:
      labels:
        app: mongodb
    spec:
      containers:
      - name: mongodb
        image: mongo:7.0
        ports:
        - containerPort: 27017
        resources:
          requests:
            cpu: "100m"
            memory: "256Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"
        volumeMounts:
        - name: mongo-data
          mountPath: /data/db
        env:
        - name: MONGO_INITDB_DATABASE
          value: "weatherdb"
      volumes:
      - name: mongo-data
        persistentVolumeClaim:
          claimName: weather-db-pvc

---
# DB Service Flask App
apiVersion: apps/v1
kind: Deployment
metadata:
  name: db-service
  namespace: weather-mlops
spec:
  replicas: 1
  selector:
    matchLabels:
      app: db-service
  template:
    metadata:
      labels:
        app: db-service
    spec:
      containers:
      - name: db-service
        image: weather-db:v1
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 5004
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "300m"
            memory: "256Mi"
        env:
        - name: MONGO_URI
          value: "mongodb://mongodb-service:27017/weatherdb"
        - name: MAX_HISTORY
          value: "10"
        readinessProbe:
          httpGet:
            path: /health
            port: 5004
          initialDelaySeconds: 10
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /health
            port: 5004
          initialDelaySeconds: 20
          periodSeconds: 20
