---
# Internal service for MongoDB (ClusterIP — not exposed externally)
apiVersion: v1
kind: Service
metadata:
  name: mongodb-service
  namespace: weather-mlops
spec:
  selector:
    app: mongodb
  type: ClusterIP
  ports:
  - protocol: TCP
    port: 27017
    targetPort: 27017

---
# Internal service for db-service Flask app (ClusterIP — not exposed externally)
apiVersion: v1
kind: Service
metadata:
  name: db-service
  namespace: weather-mlops
spec:
  selector:
    app: db-service
  type: ClusterIP
  ports:
  - protocol: TCP
    port: 5004
    targetPort: 5004
